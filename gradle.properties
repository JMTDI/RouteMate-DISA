# Project-wide Gradle settings.
# The dev container ships with Java 25 as the default JDK.
# Gradle 8.12 ships with Groovy 3 / ASM 9.6 which do not recognise class-file
# major version 69 (Java 25). Pin the Gradle daemon to the Java 21 JDK that
# is also present in the container so that Groovy can compile build scripts.
org.gradle.java.home=/home/codespace/java/21.0.9-ms
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
